<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles/style.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- daisy Ui and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <header >
        <div class="navbar bg-base-100 shadow-sm  bg-sky-100 mb-10 md:px-20 md:mx-auto">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li>
                        <a href="" class="">
                            <i class="fa-solid fa-circle-question"></i>FAQ
                        </a>
                    </li>
                    <li>
                        <a href="" class="">
                            <i class="fa-solid fa-book-open"></i>Learn
                        </a>
                    </li>
                    <li>
                        <a href="" class="">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out
                        </a>
                    </li>
                    </ul>
                </div>
                <a href="" class="flex items-center gap-1">
                    <span>English</span>
                    <img src="./assets/logo.png" alt="">
                    <span class="font-bangla font-semibold text-lg">জানালা</span>
                </a>
            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1 gap-4">
                    <li>
                        <a href="" class="btn btn-outline btn-primary">
                            <i class="fa-solid fa-circle-question"></i>FAQ
                        </a>
                    </li>
                    <li>
                        <a href="" class="btn btn-outline btn-primary">
                            <i class="fa-solid fa-book-open"></i>Learn
                        </a>
                    </li>
                    <li>
                        <a href="" class="btn btn-outline btn-primary">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i>Log Out
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <section class=" flex flex-col-reverse justify-between items-center p-10 mx-auto md:px-20 md:mx-auto md:flex-row md:gap-20 ">
        <div class="content text-center max-w-[700px]  md:text-left ">
            <h2 class="font-bold text-5xl leading-15 mb-10 ">
                <span class=" text-[#00BCFF]">English</span>
                <span class="">is Easy!!</span>
            </h2>
            <p class="font-bangla font-medium text-2xl mb-7">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
            </p>
            <div class="login-form">
                <fieldset class="fieldset w-xs mx-auto md:mx-0">
                    
                    
                    <input type="email" class="input" placeholder="Enter Your Email" />
                    <input type="password" class="input" placeholder="Enter Your Password" />
                    <button class="btn btn-soft btn-primary mt-4 max-w-40 mx-auto md:mx-0">Get Started</button>
                    
                </fieldset>
            </div>
        </div>
        <div class="image">
            <img src="./assets/hero-student.png" alt="">
        </div>
    </section>

    <section class="mt-[180px]">

        <h2 class=" font-bold text-4xl mb-10 text-center">
            <span class="text-[#00BCFF]">Let's </span> 
            Learn Vocabularies
        </h2>

        <div id="level-container" class="flex flex-wrap gap-10 justify-center" >
        </div>
    </section>
    
    
    <script src="./scripts/index.js"></script>
</body>


</html>
